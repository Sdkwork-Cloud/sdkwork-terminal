[[set]]
identifier = "desktop-host-commands"
description = "Allows the sdkwork-terminal desktop bridge commands using their invoke-visible snake_case names."
permissions = [
  "allow-desktop-host-status-bridge",
  "allow-desktop-daemon-health-bridge",
  "allow-desktop-daemon-start-bridge",
  "allow-desktop-daemon-stop-bridge",
  "allow-desktop-daemon-reconnect-bridge",
  "allow-desktop-execution-target-catalog-bridge",
  "allow-desktop-session-index-bridge",
  "allow-desktop-session-replay-slice-bridge",
  "allow-desktop-session-attach-bridge",
  "allow-desktop-session-detach-bridge",
  "allow-desktop-session-reattach-bridge",
  "allow-desktop-connector-launch-bridge",
  "allow-desktop-connector-session-create-bridge",
  "allow-desktop-connector-exec-probe-bridge",
  "allow-desktop-local-shell-exec-bridge",
  "allow-desktop-local-shell-session-create-bridge",
  "allow-desktop-session-input-bridge",
  "allow-desktop-session-input-bytes-bridge",
  "allow-desktop-local-shell-session-input-bridge",
  "allow-desktop-local-shell-session-input-bytes-bridge",
  "allow-desktop-session-attachment-acknowledge-bridge",
  "allow-desktop-session-resize-bridge",
  "allow-desktop-session-terminate-bridge",
  "allow-desktop-local-shell-session-resize-bridge",
  "allow-desktop-local-shell-session-terminate-bridge",
]

[[permission]]
identifier = "allow-desktop-host-status-bridge"
description = "Enables the desktop_host_status command."
commands.allow = ["desktop_host_status"]

