<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>sdkwork-terminal desktop</title>
    <style>
      :root {
        color-scheme: dark;
        box-sizing: border-box;
        background: #0e0e11;
      }

      *,
      *::before,
      *::after {
        box-sizing: inherit;
      }

      html {
        width: 100%;
        height: 100%;
        min-height: 100%;
        margin: 0;
        background: #0e0e11;
        text-size-adjust: 100%;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        min-height: 100%;
        margin: 0;
        padding: 0;
        background: #0e0e11;
        overflow: hidden;
      }

      body {
        overscroll-behavior: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
