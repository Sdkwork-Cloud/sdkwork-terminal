replicaCount: 2

image:
  repository: registry.sdkwork.com/apps/sdkwork-terminal/runtime-node
  tag: "0.2.59"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9620

runtimeNode:
  bindAddr: "0.0.0.0:9620"
  authTokenSecretName: sdkwork-terminal-runtime-node-auth
  authTokenSecretKey: token
  sqlitePath: "/tmp/session-runtime.sqlite3"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

livenessProbe:
  path: /healthz
  port: 9620
readinessProbe:
  path: /readyz
  port: 9620
