replicaCount: 1

image:
  repository: registry.sdkwork.com/apps/sdkwork-terminal/runtime-node
  tag: "0.2.59"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9620

runtimeNode:
  bindAddr: "0.0.0.0:9620"
  authTokenSecretName: sdkwork-terminal-runtime-node-auth
  authTokenSecretKey: token

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /healthz
  port: 9620
readinessProbe:
  path: /healthz
  port: 9620
