apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sdkwork-terminal-runtime-node.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sdkwork-terminal-runtime-node.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sdkwork-terminal-runtime-node.name" . }}
    spec:
      containers:
        - name: runtime-node
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SDKWORK_RUNTIME_NODE_BIND_ADDR
              value: {{ .Values.runtimeNode.bindAddr | quote }}
            - name: SDKWORK_RUNTIME_NODE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.runtimeNode.authTokenSecretName }}
                  key: {{ .Values.runtimeNode.authTokenSecretKey }}
          ports:
            - containerPort: 9620
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: {{ .Values.livenessProbe.port }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: {{ .Values.readinessProbe.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdkwork-terminal-runtime-node.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "sdkwork-terminal-runtime-node.name" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 9620
