apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sdkwork-terminal-runtime-node.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "sdkwork-terminal-runtime-node.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sdkwork-terminal-runtime-node.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sdkwork-terminal-runtime-node.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: runtime-node
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: SDKWORK_RUNTIME_NODE_BIND_ADDR
              value: {{ .Values.runtimeNode.bindAddr | quote }}
            - name: SDKWORK_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.runtimeNode.authTokenSecretName }}
                  key: {{ .Values.runtimeNode.authTokenSecretKey }}
            - name: SDKWORK_RUNTIME_NODE_SQLITE_PATH
              value: {{ .Values.runtimeNode.sqlitePath | quote }}
          ports:
            - containerPort: 9620
              name: http
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: 0
            periodSeconds: 2
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: runtime-data
              mountPath: /tmp
              readOnly: false
      volumes:
        - name: runtime-data
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdkwork-terminal-runtime-node.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "sdkwork-terminal-runtime-node.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "sdkwork-terminal-runtime-node.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
