services:
  runtime-node:
    build:
      context: ../..
      dockerfile: deployments/docker/runtime-node.Dockerfile
    environment:
      SDKWORK_RUNTIME_NODE_BIND_ADDR: 127.0.0.1:9620
      SDKWORK_ACCESS_TOKEN: ${SDKWORK_ACCESS_TOKEN:?set access token}
    ports:
      - "9620:9620"
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9620/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
