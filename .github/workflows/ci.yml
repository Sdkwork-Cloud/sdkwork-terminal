name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace-verify:
    name: Workspace verify
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.2 --activate

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Checkout sdkwork-app-topology
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/sdkwork-app-topology
          path: _deps/sdkwork-app-topology

      - name: Link sdkwork-app-topology for file dependency
        shell: bash
        run: ln -sfn "$GITHUB_WORKSPACE/_deps/sdkwork-app-topology" "$(dirname "$GITHUB_WORKSPACE")/sdkwork-app-topology"

      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2t64 \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            patchelf

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify runtime topology contract
        run: pnpm topology:verify

      - name: Run workspace and release contract tests
        shell: bash
        run: |
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/workspace-structure.test.mjs
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/release-plan.test.mjs
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/release-assets.test.mjs
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/release-workflows.test.mjs
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/desktop-runtime-bridge.test.ts
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/desktop-session-center.test.ts
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/shell-runtime.test.ts
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/desktop-tauri-permissions.test.ts
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/shell-app-render.test.ts
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/shell-tabs.test.ts

      - name: Run TypeScript checks
        run: pnpm typecheck

      - name: Build desktop and web workspaces
        run: pnpm build

      - name: Check Tauri desktop host
        run: cargo check --manifest-path apps/sdkwork-terminal-pc/packages/sdkwork-terminal-pc-desktop/src-tauri/Cargo.toml

  desktop-host-check:
    name: Desktop host check (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-2022
          - platform: macos
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.2 --activate

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Checkout sdkwork-app-topology
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/sdkwork-app-topology
          path: _deps/sdkwork-app-topology

      - name: Link sdkwork-app-topology for file dependency
        shell: bash
        run: ln -sfn "$GITHUB_WORKSPACE/_deps/sdkwork-app-topology" "$(dirname "$GITHUB_WORKSPACE")/sdkwork-app-topology"

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run desktop typecheck
        run: pnpm --dir apps/sdkwork-terminal-pc/apps/desktop typecheck

      - name: Check Tauri desktop host
        run: cargo check --manifest-path apps/sdkwork-terminal-pc/packages/sdkwork-terminal-pc-desktop/src-tauri/Cargo.toml
