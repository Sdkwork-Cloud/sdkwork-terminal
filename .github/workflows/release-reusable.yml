name: reusable-release

on:
  workflow_call:
    inputs:
      release_tag:
        description: Existing release tag to publish
        required: true
        type: string
      git_ref:
        description: Git ref to build; defaults to refs/tags/<release_tag>
        required: false
        default: ""
        type: string
      draft:
        description: Publish as a draft release
        required: false
        default: false
        type: boolean
      prerelease:
        description: Mark the release as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      product_name: ${{ steps.plan.outputs.product_name }}
      app_version: ${{ steps.plan.outputs.app_version }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      git_ref: ${{ steps.plan.outputs.git_ref }}
      release_name: ${{ steps.plan.outputs.release_name }}
      desktop_matrix: ${{ steps.plan.outputs.desktop_matrix }}
    steps:
      - name: Checkout workflow sources
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || format('refs/tags/{0}', inputs.release_tag) }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Resolve desktop release plan
        id: plan
        shell: bash
        run: |
          node apps/sdkwork-terminal-pc/tools/release/resolve-desktop-release-plan.mjs \
            --release-tag "${{ inputs.release_tag }}" \
            --git-ref "${{ inputs.git_ref }}" \
            --github-output

  verify-release:
    name: Verify release inputs
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.2 --activate

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2t64 \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            patchelf

      - name: Checkout sdkwork-app-topology
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/sdkwork-app-topology
          path: _deps/sdkwork-app-topology

      - name: Link sdkwork-app-topology for file dependency
        shell: bash
        run: ln -sfn "$GITHUB_WORKSPACE/_deps/sdkwork-app-topology" "$(dirname "$GITHUB_WORKSPACE")/sdkwork-app-topology"

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run release verification
        shell: bash
        run: |
          pnpm topology:verify
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/workspace-structure.test.mjs
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/release-plan.test.mjs
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/release-assets.test.mjs
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/release-workflows.test.mjs
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/desktop-runtime-bridge.test.ts
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/desktop-session-center.test.ts
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/shell-runtime.test.ts
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/desktop-tauri-permissions.test.ts
          node --experimental-strip-types apps/sdkwork-terminal-pc/tests/shell-tabs.test.ts
          pnpm --dir apps/sdkwork-terminal-pc verify:terminal-runtime
          pnpm typecheck
          pnpm build
          cargo check --manifest-path apps/sdkwork-terminal-pc/packages/sdkwork-terminal-pc-desktop/src-tauri/Cargo.toml

  desktop-release:
    name: Desktop release (${{ matrix.platform }}-${{ matrix.arch }})
    needs:
      - prepare
      - verify-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.desktop_matrix) }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.2 --activate

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2t64 \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            patchelf

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build desktop release bundles
        env:
          SDKWORK_TERMINAL_ENABLE_APPLE_CODESIGN: ${{ vars.SDKWORK_TERMINAL_ENABLE_APPLE_CODESIGN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: >
          node apps/sdkwork-terminal-pc/tools/scripts/run-tauri-cli.mjs build
          --ci
          --target ${{ matrix.target }}
          --config apps/sdkwork-terminal-pc/packages/sdkwork-terminal-pc-desktop/src-tauri/tauri.release.conf.json
          --bundles ${{ matrix.bundles }}

      - name: Verify Windows release launch smoke
        if: matrix.platform == 'windows'
        run: node apps/sdkwork-terminal-pc/tools/smoke/windows-release-launch-probe.mjs --inspect-launch --assert-passed --target "${{ matrix.target }}" --startup-delay-ms 6000

      - name: Collect desktop release assets
        run: >
          node apps/sdkwork-terminal-pc/tools/release/collect-desktop-release-assets.mjs
          --release-tag "${{ needs.prepare.outputs.release_tag }}"
          --platform ${{ matrix.platform }}
          --arch ${{ matrix.arch }}
          --target ${{ matrix.target }}
          --output-dir artifacts/release

      - name: Attest desktop release assets
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release/**/*

      - name: Upload desktop release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/release/**/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - verify-release
      - desktop-release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Download packaged release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-desktop-*
          path: release-assets
          merge-multiple: true

      - name: Finalize release assets
        run: >
          node apps/sdkwork-terminal-pc/tools/release/finalize-release-assets.mjs
          --release-tag "${{ needs.prepare.outputs.release_tag }}"
          --repository "${{ github.repository }}"
          --release-assets-dir release-assets

      - name: Render release notes
        run: >
          node apps/sdkwork-terminal-pc/tools/release/render-release-notes.mjs
          --release-tag "${{ needs.prepare.outputs.release_tag }}"
          --release-assets-dir release-assets
          --output release-assets/release-notes.md

      - name: Attest finalized release assets
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            release-assets/files/**/*
            release-assets/release-manifest.json
            release-assets/SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          body_path: release-assets/release-notes.md
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-assets/files/**/*
            release-assets/release-manifest.json
            release-assets/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
